<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Virtual Painting</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <h1 class="title">AI Canvas</h1>
            
            <div class="panel">
                <h2>Tools</h2>
                <div class="tools-grid">
                    <button id="btn-undo" class="tool-btn" title="Undo (Ctrl+Z)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                        <span>Undo</span>
                    </button>
                    <button id="btn-clear" class="tool-btn" title="Clear Canvas">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        <span>Clear</span>
                    </button>
                    <button id="btn-save" class="tool-btn" title="Save Image (S)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        <span>Save</span>
                    </button>
                    <button id="btn-eraser" class="tool-btn" title="Eraser">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16C2.5 15.5 2.5 14.5 3 14L13 4C13.5 3.5 14.5 3.5 15 4L20 9C20.5 9.5 20.5 10.5 20 11L11 20H20V20Z"></path><path d="M16 15L10 9"></path></svg>
                        <span>Eraser</span>
                    </button>
                </div>
            </div>

            <div class="panel">
                <h2>Colors</h2>
                <div class="color-grid" id="color-palette">
                    <!-- Color swatches will be generated by JS -->
                </div>
            </div>

            <div class="panel">
                <h2>Brush Size (<span id="brush-size-display">5</span>px)</h2>
                <input type="range" id="brush-slider" min="1" max="50" value="5">
            </div>

            <div class="panel stats">
                <h2>Stats</h2>
                <div class="stat-row">
                    <span>FPS:</span>
                    <span id="stat-fps" class="value">0</span>
                </div>
                <div class="stat-row">
                    <span>Mode:</span>
                    <span id="stat-mode" class="value">Hover</span>
                </div>
            </div>
            
            <div class="instructions">
                <h3>Gestures</h3>
                <ul>
                    <li>👆 <b>Draw</b>: Index up</li>
                    <li>✌️ <b>Hover</b>: Index + Middle up</li>
                    <li>🤘 <b>Erase</b>: Index + Pinky up</li>
                    <li>✋ <b>Clear</b>: Open hand (all fingers)</li>
                </ul>
            </div>
        </aside>

        <!-- Main Canvas Area -->
        <main class="canvas-container">
            <div class="stream-wrapper">
                <img id="video-stream" src="/stream" alt="Live Canvas Stream">
                <div class="overlay-hud">
                    <div id="hud-color" class="hud-indicator color-indicator"></div>
                    <div id="hud-mode" class="hud-indicator mode-indicator">Hover</div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
